name: dallal_proj
description: "Dallal - A real estate listing application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.0
  get_it: ^9.2.0
  go_router: ^16.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  image_picker: ^1.0.5
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  persistent_bottom_nav_bar: ^6.2.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.1
  url_launcher: ^6.3.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/BLogo.png"
  adaptive_icon_background: "#ffffff"

dev_dependencies:
  build_runner: 2.5.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/imgs/
    - assets/icons/
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Black.ttf
        - asset: assets/fonts/Rubik-BlackItalic.ttf
          style: italic
        - asset: assets/fonts/Rubik-Bold.ttf
        - asset: assets/fonts/Rubik-BoldItalic.ttf
          style: italic
        - asset: assets/fonts/Rubik-ExtraBold.ttf
        - asset: assets/fonts/Rubik-ExtraBoldItalic.ttf
          style: italic
        - asset: assets/fonts/Rubik-Italic.ttf
          style: italic
        - asset: assets/fonts/Rubik-Light.ttf
        - asset: assets/fonts/Rubik-LightItalic.ttf
          style: italic
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-MediumItalic.ttf
          style: italic
        - asset: assets/fonts/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rubik-SemiBold.ttf
        - asset: assets/fonts/Rubik-SemiBoldItalic.ttf
          style: italic
        - asset: assets/fonts/Rubik-VariableFont_wght.ttf
